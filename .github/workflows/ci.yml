name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least privilege: the build only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The same quality gates that must pass locally: unit tests, static analysis,
      # and debug assembly.
      - name: Test, detekt, assemble
        run: ./gradlew test detekt assembleDebug --no-daemon --stacktrace
